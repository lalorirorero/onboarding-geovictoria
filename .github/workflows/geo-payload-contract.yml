name: Geo Payload Contract

on:
  pull_request:
  push:

jobs:
  contract-geo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Geo Payload Contract
        run: npm run contract:geo

